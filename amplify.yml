version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
    build:
      commands:
        - echo "Build completed"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
backend:
  phases:
    preBuild:
      commands:
        - echo "Backend pre-build"
    build:
      commands:
        - echo "Backend build completed"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
